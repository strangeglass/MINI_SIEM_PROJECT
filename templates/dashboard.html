<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini SIEM Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="container mx-auto p-6">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Security Dashboard</h1>

        <div class="bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-semibold mb-4 text-red-600">Active Alerts</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full bg-white">
                    <thead class="bg-gray-800 text-white">
                        <tr>
                            <th class="text-left py-3 px-4 uppercase font-semibold text-sm">Timestamp</th>
                            <th class="text-left py-3 px-4 uppercase font-semibold text-sm">Source IP</th>
                            <th class="text-left py-3 px-4 uppercase font-semibold text-sm">Message</th>
                        </tr>
                    </thead>
                    <tbody id="alert-table-body" class="text-gray-700">
                        {% for alert in alerts %}
                        <tr class="border-b hover:bg-red-50">
                            <td class="text-left py-3 px-4">{{ alert[1] }}</td>
                            <td class="text-left py-3 px-4">{{ alert[2] }}</td>
                            <td class="text-left py-3 px-4">{{ alert[3] }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Function to refresh the dashboard content smoothly
        function refreshDashboard() {
            fetch('/')
                .then(response => response.text())
                .then(html => {
                    // Create a temporary document to hold the fetched HTML
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    
                    // Replace the current table body with the new one
                    const newTableBody = doc.querySelector('#alert-table-body');
                    const currentTableBody = document.querySelector('#alert-table-body');
                    
                    if (newTableBody && currentTableBody) {
                        currentTableBody.innerHTML = newTableBody.innerHTML;
                    }
                })
                .catch(error => console.error('Error fetching dashboard:', error));
        }

        // Refresh every 4 seconds (4000 milliseconds)
        setInterval(refreshDashboard, 4000);
    </script>
</body>
</html>
